<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced VS Code IDE Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ext-language_tools.js"></script>
    <style>
        :root {
            --bg-main: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-activity: #333333;
            --bg-tabs: #2d2d2d;
            --bg-tab-hover: #2b2d2e;
            --border-color: #3e3e42;
            --accent: #007acc;
            --accent-hover: #0062a3;
            --text-main: #cccccc;
            --text-muted: #969696;
            --console-bg: #111111;
            --error-color: #f48771;
            --warn-color: #cca700;
            --shell-color: #4caf50;
            --statusbar-bg: #007acc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Core Layout Grid */
        .ide-container {
            display: flex;
            flex: 1;
            height: calc(100% - 22px);
            overflow: hidden;
        }

        /* Activity Bar (Far Left) */
        .activity-bar {
            width: 48px;
            background-color: var(--bg-activity);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            z-index: 10;
        }
        .activity-icon {
            color: var(--text-muted);
            padding: 12px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .activity-icon.active, .activity-icon:hover { color: white; border-left: 2px solid var(--accent); }

        /* Sidebar (Explorer) */
        .sidebar {
            width: 200px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width 0.3s, opacity 0.3s;
        }
        .sidebar-header {
            font-size: 11px;
            text-transform: uppercase;
            padding: 10px 15px;
            color: var(--text-muted);
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }
        .explorer-tree { flex: 1; overflow-y: auto; }
        .file-item {
            display: flex;
            align-items: center;
            padding: 4px 15px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            gap: 8px;
            user-select: none;
        }
        .file-item:hover { background-color: rgba(255, 255, 255, 0.05); }
        .file-item.active { background-color: rgba(0, 122, 204, 0.2); color: white; }
        .sidebar-actions { padding: 10px; display: flex; gap: 5px; border-top: 1px solid var(--border-color); }
        .sidebar-actions button { flex: 1; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 3px; }
        .sidebar-actions button:hover { background: var(--bg-tabs); color: white; }

        @media (max-width: 600px) {
            .sidebar { width: 0; opacity: 0; overflow: hidden; border: none; }
            .sidebar.mobile-open { width: 200px; opacity: 1; position: absolute; left: 48px; height: 100%; z-index: 9; border-right: 1px solid var(--border-color); }
        }

        /* Editor Area */
        .main-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        /* Tabs */
        .tabs-header {
            display: flex;
            background-color: var(--bg-main);
            overflow-x: auto;
            scrollbar-width: none;
            min-height: 40px;
        }
        .tabs-header::-webkit-scrollbar { display: none; }
        .tab {
            background-color: var(--bg-tabs);
            color: var(--text-muted);
            border-right: 1px solid var(--bg-main);
            padding: 8px 30px 8px 14px;
            cursor: pointer;
            font-family: Consolas, monospace;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            position: relative;
            user-select: none;
            transition: transform 0.1s;
        }
        .tab.active { background-color: var(--bg-main); color: white; border-top: 2px solid var(--accent); }
        .tab.drag-over { opacity: 0.5; border-left: 2px solid var(--accent); }
        
        .tab-close {
            position: absolute;
            right: 6px;
            width: 18px;
            height: 18px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }
        .tab:hover .tab-close, .tab.active .tab-close { opacity: 0.7; }
        .tab-close:hover { opacity: 1 !important; background-color: rgba(255,255,255,0.1); }

        .toolbar {
            background-color: var(--bg-main);
            padding: 5px 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .run-btn { background: var(--accent); color: white; border: none; padding: 4px 12px; border-radius: 3px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: bold; }
        .run-btn:hover { background: var(--accent-hover); }

        /* Workspace Layout */
        .workspace { display: flex; flex-direction: column; flex: 1; height: 100%; position: relative; }
        @media (min-width: 768px) { .workspace { flex-direction: row; } }
        
        #editor-container { flex: 1; height: 50vh; position: relative; }
        .editor-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; color: var(--text-muted); font-size: 18px; font-weight: 300; opacity: 0.5; user-select: none; background: var(--bg-main); position: absolute; top: 0; left: 0; z-index: 5; text-align: center; padding: 20px; }
        
        @media (min-width: 768px) { #editor-container { height: 100%; width: 50%; border-right: 1px solid var(--border-color); } }

        /* Output Viewports */
        .output-panel { flex: 1; display: flex; flex-direction: column; background: var(--console-bg); height: 50vh; }
        @media (min-width: 768px) { .output-panel { height: 100%; width: 50%; } }

        .output-header {
            background: var(--bg-sidebar);
            display: flex;
            border-bottom: 1px solid var(--border-color);
            user-select: none;
        }
        .output-tab {
            padding: 6px 16px;
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-right: 1px solid var(--border-color);
        }
        .output-tab.active { background: var(--console-bg); color: white; font-weight: bold; }
        
        .output-content { flex: 1; position: relative; display: none; overflow: auto; }
        .output-content.active { display: block; }

        #console-output { padding: 10px; font-family: Consolas, monospace; font-size: 13px; }
        .log-line { padding: 3px 0; border-bottom: 1px solid #1c1c1c; word-wrap: break-word; white-space: pre-wrap; display: flex; gap: 6px; }
        .log-error { color: var(--error-color); }
        .log-warn { color: var(--warn-color); }
        .log-system { color: #888; font-style: italic; }
        .log-shell { color: var(--shell-color); font-weight: bold; }
        
        #live-preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }
        
        /* Status Bar */
        .status-bar {
            height: 22px;
            background-color: var(--statusbar-bg);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-size: 11px;
            user-select: none;
        }
        .status-item { display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 0 5px; height: 100%; }
        .status-item:hover { background-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="ide-container">
        <div class="activity-bar">
            <div class="activity-icon active" onclick="document.querySelector('.sidebar').classList.toggle('mobile-open')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </div>
            <div class="activity-icon" onclick="exportFiles()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">EXPLORER 
                <span style="cursor:pointer;" onclick="clearConsole()">🧹</span>
            </div>
            <div class="explorer-tree" id="explorer"></div>
            <div class="sidebar-actions">
                <button onclick="promptNewFile()">+ File</button>
                <button onclick="resetWorkspace()">Reset</button>
            </div>
        </div>

        <div class="main-content">
            <div class="tabs-header" id="tabs-container"></div>
            <div class="toolbar">
                <button class="run-btn" onclick="runCode()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Run Scripts
                </button>
            </div>
            <div class="workspace">
                <div id="editor-container">
                    <div class="editor-placeholder" id="placeholder-layer"></div>
                </div>
                
                <div class="output-panel">
                    <div class="output-header">
                        <div class="output-tab active" id="tab-nav-terminal" onclick="switchOutputTab('terminal')">Terminal Output</div>
                        <div class="output-tab" id="tab-nav-preview" onclick="switchOutputTab('preview')">Live Preview</div>
                    </div>
                    
                    <div class="output-content active" id="output-content-terminal">
                        <div id="console-output"></div>
                    </div>
                    
                    <div class="output-content" id="output-content-preview" style="height:100%;">
                        <iframe id="live-preview-frame" sandbox="allow-scripts"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div style="display: flex;">
            <div class="status-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> 0</div>
            <div class="status-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg> 0</div>
        </div>
        <div style="display: flex;">
            <div class="status-item" id="status-lang">READY</div>
            <div class="status-item">UTF-8</div>
            <div class="status-item">LF</div>
        </div>
    </div>

    <script>
        /* ================= Virtual Storage Layer ================= */
        const memStorage = {};
        const safeStorage = {
            get: function(key) { try { return localStorage.getItem(key) || memStorage[key] || null; } catch(e) { return memStorage[key] || null; } },
            set: function(key, val) { try { localStorage.setItem(key, val); } catch(e) { memStorage[key] = val; } },
            remove: function(key) { try { localStorage.removeItem(key); } catch(e) { delete memStorage[key]; } }
        };

        /* ================= Empty Workspace Initialization ================= */
        let files = [];
        try { files = JSON.parse(safeStorage.get('ide_vfs')) || []; } catch (e) { files = []; }
        
        let openTabs = [];
        try { openTabs = JSON.parse(safeStorage.get('ide_tabs')) || []; } catch (e) { openTabs = []; }

        let activeFileId = safeStorage.get('ide_active') || null;
        let editor;

        function saveState() {
            safeStorage.set('ide_vfs', JSON.stringify(files));
            safeStorage.set('ide_tabs', JSON.stringify(openTabs));
            safeStorage.set('ide_active', activeFileId);
        }

        /* ================= VFS Methods ================= */
        function createVFSFile(name, content = "") {
            let existing = files.find(f => f.name === name);
            if (existing) {
                openFile(existing.id);
                return;
            }
            
            let type = 'text';
            if(name.endsWith('.py')) type = 'python';
            else if(name.endsWith('.sh')) type = 'shell';
            else if(name.endsWith('.html')) type = 'html';
            else if(name.endsWith('.css')) type = 'css';
            else if(name.endsWith('.js')) type = 'javascript';
            
            let newFile = { id: 'f' + Date.now(), name: name, type: type, content: content };
            files.push(newFile);
            openTabs.push(newFile.id);
            activeFileId = newFile.id;
            
            saveState();
            renderUI();
        }

        /* ================= Core Code Editor Build ================= */
        try {
            editor = ace.edit("editor-container");
            editor.setTheme("ace/theme/tomorrow_night_eighties");
            editor.setOptions({ fontSize: "14px", showPrintMargin: false, enableBasicAutocompletion: true });
            
            editor.on("change", () => {
                if(!activeFileId) return;
                let f = files.find(f => f.id === activeFileId);
                if (f) { f.content = editor.getValue(); saveState(); }
            });
        } catch (e) { console.error("Editor loading failure", e); }

        function resetWorkspace() {
            if(confirm("Wipe workspace and start fresh?")) {
                safeStorage.remove('ide_vfs');
                safeStorage.remove('ide_tabs');
                safeStorage.remove('ide_active');
                location.reload();
            }
        }

        function exportFiles() {
            saveState();
            if(files.length === 0) return alert("No source maps to save.");
            files.forEach(f => {
                let mime = f.type === 'html' ? 'text/html' : f.type === 'css' ? 'text/css' : f.type === 'javascript' ? 'text/javascript' : 'text/plain';
                const blob = new Blob([f.content], { type: mime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = f.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        }

        /* ================= Custom Colored SVG Library ================= */
        const icons = {
            py: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3776ab" stroke-width="2"><path d="M12 22a7 7 0 0 0 7-7h-3a4 4 0 0 1-4 4H5a3 3 0 0 1-3-3V9a3 3 0 0 1 3-3h3V3a3 3 0 0 1 3-3h5a3 3 0 0 1 3 3v3h1a4 4 0 0 1 4 4v5a7 7 0 0 1-7 7z"/></svg>',
            sh: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>',
            html: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e34f26" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>',
            css: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1572b6" stroke-width="2"><path d="M10 12l2-9 8 2-2 9-8-2zm-6 2l12 3-1 4-12-3 1-4z"></path></svg>',
            js: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f7df1e" stroke-width="2"><path d="M2 2h20v20H2z"></path><path d="M11 16c-1.5 1.5-3 1.5-4 0M17 16c-1.5 1.5-3 1.5-4 0M11 10v6M17 10v6"></path></svg>',
            txt: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#969696" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>'
        };

        function getIcon(name) {
            if (name.endsWith('.py')) return icons.py;
            if (name.endsWith('.sh')) return icons.sh;
            if (name.endsWith('.html') || name.endsWith('.htm')) return icons.html;
            if (name.endsWith('.css')) return icons.css;
            if (name.endsWith('.js')) return icons.js;
            return icons.txt;
        }

        /* ================= Interface Navigation Handles ================= */
        function switchOutputTab(tabType) {
            document.querySelectorAll('.output-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.output-content').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-nav-${tabType}`).classList.add('active');
            document.getElementById(`output-content-${tabType}`).classList.add('active');
            
            if(tabType === 'preview') compileLiveSandbox();
        }

        /* ================= Sandboxed Document Engine ================= */
        function compileLiveSandbox() {
            const htmlFile = files.find(f => f.name.endsWith('.html'))?.content || '';
            const cssFile = files.find(f => f.name.endsWith('.css'))?.content || '';
            const jsFile = files.find(f => f.name.endsWith('.js'))?.content || '';

            const iframe = document.getElementById('live-preview-frame');
            if(!iframe) return;

            iframe.srcdoc = `
                <!DOCTYPE html>
                <html lang="en">
                <head>
                    <meta charset="UTF-8">
                    <style>${cssFile}</style>
                </head>
                <body>
                    ${htmlFile}
                    <script>
                        window.onerror = function(message, source, lineno, colno, error) {
                            window.parent.postMessage({type: 'iframe-error', msg: message, line: lineno}, '*');
                            return false;
                        };
                        ${jsFile}
                    <\/script>
                </body>
                </html>
            `;
        }

        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'iframe-error') {
                simLog('error', `Sandbox Runtime Exception (Line ${e.data.line}): ${e.data.msg}`);
            }
        });

        /* ================= Layout & Window Node Renders ================= */
        let draggedTabId = null;

        function renderUI() {
            // Explorer tree node sync
            const exp = document.getElementById('explorer');
            exp.innerHTML = '';
            files.forEach(f => {
                let div = document.createElement('div');
                div.className = 'file-item' + (f.id === activeFileId ? ' active' : '');
                div.innerHTML = getIcon(f.name) + '<span>' + f.name + '</span>';
                div.onclick = () => openFile(f.id);
                exp.appendChild(div);
            });

            // Tabs layout context sync
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';
            
            openTabs.forEach((tid, index) => {
                let f = files.find(file => file.id === tid);
                if(!f) return;

                let t = document.createElement('div');
                t.className = 'tab' + (f.id === activeFileId ? ' active' : '');
                t.innerHTML = getIcon(f.name) + `<span>${f.name}</span>`;
                
                let closeBtn = document.createElement('div');
                closeBtn.className = 'tab-close';
                closeBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
                closeBtn.onclick = (e) => closeTab(e, f.id);
                t.appendChild(closeBtn);

                // Desktop Drag Triggers
                t.draggable = true;
                t.ondragstart = (e) => { draggedTabId = f.id; e.dataTransfer.effectAllowed = "move"; };
                t.ondragover = (e) => { e.preventDefault(); t.classList.add('drag-over'); };
                t.ondragleave = () => t.classList.remove('drag-over');
                t.ondrop = (e) => {
                    e.preventDefault();
                    t.classList.remove('drag-over');
                    if (draggedTabId && draggedTabId !== f.id) { moveTab(draggedTabId, index); }
                };

                // Mobile Touch Swiping Tab Arranger
                let touchStartX = 0;
                t.ontouchstart = (e) => { touchStartX = e.touches[0].clientX; };
                t.ontouchend = (e) => {
                    let diff = e.changedTouches[0].clientX - touchStartX;
                    if (Math.abs(diff) > 40) {
                        if (diff > 0 && index < openTabs.length - 1) moveTab(f.id, index + 1);
                        else if (diff < 0 && index > 0) moveTab(f.id, index - 1);
                    } else if (Math.abs(diff) < 10) {
                        openFile(f.id);
                    }
                };
                
                t.onmousedown = () => { openFile(f.id) };
                tabsContainer.appendChild(t);
            });

            // Handle workspace visibility states safely
            let active = files.find(f => f.id === activeFileId);
            const placeholder = document.getElementById('placeholder-layer');
            
            if(active && openTabs.includes(activeFileId)) {
                placeholder.style.display = 'none';
                document.getElementById('status-lang').innerText = active.type.toUpperCase();
                if(editor) {
                    let mode = active.type === 'javascript' ? 'javascript' : active.type;
                    editor.session.setMode("ace/mode/" + mode);
                    if(editor.getValue() !== active.content) editor.setValue(active.content, -1);
                }
            } else {
                placeholder.style.display = 'flex';
                document.getElementById('status-lang').innerText = "READY";
            }
        }

        function openFile(id) {
            if (!openTabs.includes(id)) openTabs.push(id);
            activeFileId = id;
            saveState();
            renderUI();
        }

        function closeTab(e, id) {
            e.stopPropagation();
            openTabs = openTabs.filter(tid => tid !== id);
            if (activeFileId === id) activeFileId = openTabs.length > 0 ? openTabs[openTabs.length - 1] : null;
            saveState();
            renderUI();
        }

        function moveTab(draggedId, targetIndex) {
            let currentIndex = openTabs.indexOf(draggedId);
            openTabs.splice(currentIndex, 1);
            openTabs.splice(targetIndex, 0, draggedId);
            saveState();
            renderUI();
        }

        function promptNewFile() {
            let n = prompt("Enter filename (e.g. index.html, main.py, styles.css):");
            if(n) createVFSFile(n, "");
        }

        function clearConsole() { document.getElementById('console-output').innerHTML = ''; }
        function simLog(type, msg) {
            const out = document.getElementById('console-output');
            out.innerHTML += `<div class="log-line log-${type}"><span>&gt;&nbsp;</span><span>${msg}</span></div>`;
            out.scrollTop = out.scrollHeight;
        }

        async function runCode() {
            clearConsole();
            simLog('system', 'Building runtime environment compilation trees...');
            compileLiveSandbox();
            simLog('shell', 'Live preview updated container contexts.');
            
            let active = files.find(f => f.id === activeFileId);
            if(active) simLog('log', `Active process thread linked: ${active.name}`);
        }

        renderUI();
    </script>
</body>
</html>
