#cmd-list{list-style:none;max-height:260px;overflow-y:auto;padding:4px}#cmd-list li{padding:7px 14px;cursor:pointer;border-radius:var(--radius);font-size:13px;color:var(--text2);display:flex;align-items:center;gap:10px;transition:all .08s}#cmd-list li:hover,#cmd-list li.sel{background:var(--accent-bg);color:var(--accent)}#cmd-list li i{width:16px;text-align:center;font-size:12px;color:var(--subtle)}#cmd-list li:hover i,#cmd-list li.sel i{color:var(--accent)}#cmd-list li .sc{margin-left:auto;font-size:10px;color:var(--subtle);font-family:var(--font-mono);background:var(--bg3);padding:1px 6px;border-radius:3px}
.modal-box h3{padding:16px 20px 0;font-size:15px;font-weight:700;color:var(--text)}.modal-box p.desc{padding:4px 20px 0;font-size:12px;color:var(--muted)}
.modal-box input,.modal-box select{width:calc(100% - 40px);margin:12px 20px;padding:8px 12px;background:var(--bg0);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-ui);font-size:13px;outline:none;transition:border-color .15s}.modal-box input:focus,.modal-box select:focus{border-color:var(--accent)}.modal-box select option{background:var(--bg2);color:var(--text)}
.m-acts{display:flex;justify-content:flex-end;gap:8px;padding:10px 20px 16px}.m-acts button{padding:7px 18px;border-radius:var(--radius);font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .15s}.m-cancel{background:transparent;color:var(--text2)}.m-cancel:hover{background:var(--bg4)}.m-ok{background:var(--accent);color:#fff;border-color:var(--accent)}.m-ok:hover{filter:brightness(1.1)}
#toasts{position:fixed;bottom:60px;right:14px;z-index:2000;display:flex;flex-direction:column-reverse;gap:6px}.toast{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;color:#fff;display:flex;align-items:center;gap:8px;animation:slideIn .2s;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:300px}.toast.ok{background:var(--green)}.toast.err{background:var(--red)}.toast.inf{background:var(--blue)}.toast.wrn{background:var(--accent2)}@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
#ctx{position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:1500;padding:4px;min-width:170px;display:none}.ctx-i{padding:6px 12px;font-size:12px;color:var(--text2);cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:8px;transition:all .08s}.ctx-i:hover{background:var(--accent-bg);color:var(--accent)}.ctx-i i{padding-right:6px;width:14px;text-align:center;font-size:11px;color:var(--subtle)}.ctx-i:hover i{color:var(--accent)}.ctx-s{height:1px;background:var(--border);margin:4px 8px}
#mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--mob-bar-h);background:var(--bg1);border-top:1px solid var(--border);z-index:900;padding:0 4px;align-items:center;justify-content:space-around;box-shadow:0 -2px 12px rgba(0,0,0,.2)}
.mb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:9px;font-weight:600;padding:6px 4px;border-radius:8px;transition:all .12s;min-width:44px;font-family:var(--font-ui)}.mb i{font-size:18px;transition:all .12s}.mb:active{transform:scale(.9)}.mb.active{color:var(--accent)}.mb.run{color:var(--green)}.mb.run:active{background:var(--green-bg)}
#mob-sheet{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);border-radius:16px 16px 0 0;z-index:950;padding:8px 0 env(safe-area-inset-bottom,8px);box-shadow:0 -4px 24px rgba(0,0,0,.4);animation:slideUp .2s}#mob-sheet.open{display:block}

.sheet-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:4px auto 12px}
.sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:0 12px}
.sg-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px 4px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:10px;transition:all .12s;font-family:var(--font-ui);font-size:10px;font-weight:600}.sg-btn:active{background:var(--accent-bg);transform:scale(.95)}.sg-btn i{font-size:20px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--bg3)}.sg-btn:active i{background:var(--accent-bg);color:var(--accent)}
.sheet-divider{height:1px;background:var(--border);margin:8px 16px}
.sheet-row{display:flex;justify-content:center;gap:16px;padding:8px 16px}
.sr-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:var(--font-ui);font-size:13px;font-weight:600;transition:all .12s}.sr-btn:active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}.sr-btn i{font-size:16px}

<script>
(function(){
  // pick a random hue between red (≈10°) and yellow (≈50°)
  const h = Math.floor(Math.random() * (50 - 10 + 1)) + 10;
  const root = document.documentElement.style;
  // primary accent (vibrant)
  root.setProperty('--accent', `hsl(${h} 90% 55%)`);
  // secondary accent (darker)
  root.setProperty('--accent2', `hsl(${Math.min(60, h + 18)} 72% 44%)`);
  // semitransparent background and glow using HSLA
  root.setProperty('--accent-bg', `hsla(${h},90%,55%,0.12)`);
  root.setProperty('--accent-glow', `hsla(${h},90%,55%,0.25)`);
  // ensure mobile copy/paste works smoothly by allowing user selection & touch action
  const mobileCss = `
    .CodeMirror, .CodeMirror * { -webkit-user-select: text !important; user-select: text !important; }
    #preview-body, #output-body { -webkit-user-select: text; user-select: text; touch-action: manipulation; }
  `;
  const s = document.createElement('style');
  s.dataset.generated = 'accent-mobile-select';
  s.appendChild(document.createTextNode(mobileCss));
  document.head.appendChild(s);
})();
</script>

/* ═══ SMART HINT: HTML auto-tags + custom dicts ═══ */
function smartHint(cm,options){
  const tab=activeTab();
  if(!tab)return null;
  // For HTML mode, use CodeMirror's built-in html-hint which handles < tags natively
  if(tab.lang==='htmlmixed'&&typeof CodeMirror.hint.html==='function'){
    const result=CodeMirror.hint.html(cm,options);
    if(result&&result.list&&result.list.length>0)return result;
  }
  // Fallback to our custom dictionary hint
  return langHint(cm);
}

function langHint(cm){
  const cur=cm.getCursor();const tok=cm.getTokenAt(cur);
  const word=tok.string.replace(/^\s+/,'');if(word.length<1)return null;
  const tab=activeTab();if(!tab)return null;
  let dict=HINTS[tab.lang]||[];const lower=word.toLowerCase();
  let m=dict.filter(h=>h.toLowerCase().startsWith(lower)&&h!==word);
  if(!m.length)m=dict.filter(h=>h.toLowerCase().includes(lower)&&h!==word);
  if(m.length>50)m=m.slice(0,50);
  if(!m.length)return null;
  return{list:m,from:CodeMirror.Pos(cur.line,tok.start),to:CodeMirror.Pos(cur.line,cur.ch)};
}

let hintTimer=null;
function autoHint(cm,change){
  if(cm.state.completionActive)return;
  const tok=cm.getTokenAt(cm.getCursor());
  const ch=tok.string.trim();
  // Trigger on < for HTML/XML tag completion
  if(ch==='<'){
    const tab=activeTab();
    if(tab&&(tab.lang==='htmlmixed'||tab.lang==='xml')){cm.showHint({hint:smartHint,completeSingle:false});return}
  }
  // Trigger on regular typing
  if(ch.length>=2&&/^[a-zA-Z_#@<:.]/.test(ch))cm.showHint({hint:smartHint,completeSingle:false});
}

function runShell(code){let out='';const lines=code.split('\n');const V={};for(let raw of lines){let l=raw.trim();if(!l||l.startsWith('#'))continue;Object.entries(V).forEach(([k,v])=>l=l.replace(new RegExp('\\$\\{?'+k+'\\}?','g'),v));l=l.replace(/\$\(([^)]+)\)/g,(_,c)=>{if(c.startsWith('date'))return new Date().toString();if(c.startsWith('whoami'))return'user';if(c.startsWith('pwd'))return'/home/user';return''});const am=l.match(/^([A-Za-z_]\w*)=(.*)$/);if(am&&l.indexOf('=')===l.search(/=/)){V[am[1]]=am[2].replace(/^["']|["']$/g,'');continue}if(l.startsWith('echo ')){let m=l.slice(5).replace(/^["']|["']$/g,'');Object.entries(V).forEach(([k,v])=>m=m.replace(new RegExp('\\$\\{?'+k+'\\}?','g'),v));out+=m+'\n';continue}const mm=l.match(/\$\(\(([^)]+)\)\)/);if(mm){try{out+=String(eval(mm[1]))+'\n'}catch(e){out+='Error\n'}continue}if(l==='date')out+=new Date().toString()+'\n';else if(l==='whoami')out+='user\n';else if(l==='pwd')out+='/home/user\n';else if(l==='ls')out+='file1.txt  file2.sh\n';else if(l.startsWith('for ')||l.startsWith('if ')||l==='do'||l==='done'||l==='then'||l==='fi'||l==='else'||l==='elif'||l.startsWith('while '))continue;else out+=l+'\n';if(out.length>MAX_OUTPUT){out+='\n\n... [Output truncated] ...\n';break}}setOutput(out||'Done.');toast('Shell OK','ok');stopRun()}

function previewQML(body,code){const bg=S.dark?'#1e1e2e':'#f8f9fa';body.style.background=bg;if(!code.trim()){body.innerHTML=`<div style="padding:24px;text-align:center;color:#6e7681">Write QML code to preview</div>`;return}try{const tree=parseQML(code);if(!tree){body.innerHTML=`<div style="padding:24px;text-align:center;color:#6e7681">No renderable QML objects</div>`;return}body.innerHTML=renderQMLNode(tree,bg)}catch(e){body.innerHTML=`<div style="padding:20px;color:var(--red);font-size:12px"><strong>QML Error:</strong><br>${esc(e.message)}</div>`}}
function parseQML(code){code=code.replace(/\/\/.*$/gm,'').replace(/\/\*[\s\S]*?\*\//g,'').replace(/^import\s+[^;]+;?\s*$/gm,'').trim();if(!code)return null;const m=code.match(/\b([A-Z][A-Za-z0-9]*)\s*\{/);if(!m)return null;return parseQMLObject(code,m.index)}
function parseQMLObject(code,si){const nm=code.substring(si).match(/^([A-Z][A-Za-z0-9]*)\s*\{/);if(!nm)return null;let i=si+nm[0].length-1;const be=findBrace(code,i);const bc=code.substring(i+1,be);const{props,children}=parseQMLBlock(bc);return{type:nm[1],props,children}}
function findBrace(code,oi){let d=0,i=oi;while(i<code.length){const c=code[i];if(c==='{')d++;else if(c==='}'){d--;if(d===0)return i}else if(c==='"'||c==="'"){const q=c;i++;while(i<code.length&&code[i]!==q){if(code[i]==='\\')i++;i++}}i++}return code.length-1}
function parseQMLBlock(content){const props={},children=[];let i=0;while(i<content.length){while(i<content.length&&/\s/.test(content[i]))i++;if(i>=content.length)break;if(/[A-Z]/.test(content[i])){const nm=content.substring(i).match(/^([A-Z][A-Za-z0-9]*)\s*\{/);if(nm){const child=parseQMLObject(content,i);if(child){children.push(child);const eStart=i+nm[0].length-1;const eEnd=findBrace(content,eStart);i=eEnd+1;continue}}}const pm=content.substring(i).match(/^([a-zA-Z_][a-zA-Z0-9_.]*)\s*:/);if(pm){const pn=pm[1];i+=pm[0].length;while(i<content.length&&/\s/.test(content[i]))i++;const vr=parseQMLValue(content,i,pn);if(vr){if(vr.type==='object')children.push({type:pn,...vr.value});else if(vr.type!=='skip')props[pn]=vr.value;i=vr.end;continue}}i++}return{props,children}}
function parseQMLValue(content,start,propName){let i=start;while(i<content.length&&/\s/.test(content[i]))i++;if(i>=content.length)return null;if(content[i]==='{'){const end=findBrace(content,i);if(propName&&propName.startsWith('on'))return{type:'skip',value:null,end:end+1};const bc=content.substring(i+1,end);const{props,children}=parseQMLBlock(bc);return{type:'object',value:{props,children},end:end+1}}if(content[i]==='"'||content[i]==="'"){const q=content[i];let s='';i++;while(i<content.length&&content[i]!==q){if(content[i]==='\\'){s+=content[i++];if(i<content.length)s+=content[i++]}else s+=content[i++]}if(i<content.length)i++;while(i<content.length&&content[i]!==';'&&content[i]!=='\n')i++;if(i<content.length&&content[i]===';')i++;return{type:'string',value:s,end:i}}let val='',depth=0;while(i<content.length){if(content[i]==='{')depth++;else if(content[i]==='}'){if(depth===0)break;depth--}else if((content[i]===';'||content[i]==='\n')&&depth===0)break;val+=content[i];i++}if(i<content.length&&content[i]===';')i++;val=val.trim();if(!val)return null;return{type:'primitive',value:val,end:i}}
function renderQMLNode(node,bg){if(!node)return'';const sty=buildQMLStyle(node);const ch=(node.children||[]).map(c=>renderQMLNode(c,bg)).join('');const ss=Object.entries(sty).map(([k,v])=>`${k.replace(/[A-Z]/g,m=>'-'+m.toLowerCase())}:${v}`).join(';');const tag=node.type,p=node.props||{};if(tag==='Gradient'||tag==='GradientStop')return'';if(tag==='Text'){const t=String(p.text||'');const fs=parseInt(p['font.pixelSize'])||14;const b=p['font.bold']==='true'?'font-weight:700;':'';const c=p.color||'#fff';const al=p['anchors.horizontalCenter']==='parent.horizontalCenter'?'text-align:center;width:100%;':'';return`<div style="font-size:${fs}px;${b}color:${c};${al};display:flex;align-items:center">${t}</div>`}if(tag==='Button'){const t=String(p.text||'Button');const bg2=p.color||'#e94560';return`<button style="padding:8px 20px;border:none;border-radius:6px;background:${bg2};color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:system-ui">${t}</button>`}if(tag==='TextField')return`<input type="text" placeholder="${esc(p.placeholderText||p.text||'')}" style="padding:8px 12px;border:1px solid #555;border-radius:4px;background:#2a2a3a;color:#fff;font-size:14px;width:200px">`;if(tag==='Switch')return`<label style="display:flex;align-items:center;gap:8px;color:#ccc"><input type="checkbox"><span>Switch</span></label>`;if(tag==='CheckBox')return`<label style="display:flex;align-items:center;gap:8px;color:#ccc"><input type="checkbox"><span>${p.text||'Checkbox'}</span></label>`;if(tag==='Slider')return`<input type="range" style="width:200px">`;if(tag==='ProgressBar'){const v=p.value||0.5;return`<div style="width:200px;height:6px;background:#333;border-radius:3px;overflow:hidden"><div style="width:${v*100}%;height:100%;background:#e94560;border-radius:3px"></div></div>`}if(tag==='Column')return`<div style="${ss};display:flex;flex-direction:column;align-items:center;gap:${p.spacing||8}px">${ch}</div>`;if(tag==='Row')return`<div style="${ss};display:flex;flex-direction:row;align-items:center;gap:${p.spacing||8}px">${ch}</div>`;if(tag==='ApplicationWindow'||tag==='Window'){const w=p.width||400;const h=p.height||600;return`<div style="width:${w}px;max-width:100%;height:${h}px;${ss};overflow:hidden;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.3);margin:0 auto">${ch}</div>`}if(tag==='Timer'||tag==='MouseArea')return'';if(tag==='Flickable')return`<div style="${ss};overflow:auto">${ch}</div>`;if(tag==='Item')return`<div style="${ss};position:relative">${ch}</div>`;return`<div style="${ss}">${ch}</div>`}
function buildQMLStyle(n){const s={},p=n.props||{};if(p.width)s.width=p.width+'px';if(p.height)s.height=p.height+'px';if(p.color)s.backgroundColor=p.color;if(p.radius)s.borderRadius=p.radius+'px';if(p['border.width']){s.borderWidth=p['border.width']+'px';s.borderStyle='solid'}if(p['border.color'])s.borderColor=p['border.color'];if(p['anchors.fill']==='parent'){s.width='100%';s.height='100%'}if(p['anchors.centerIn']==='parent'){s.position='absolute';s.top='50%';s.left='50%';s.transform='translate(-50%,-50%)'}if(p['anchors.horizontalCenter']==='parent.horizontalCenter'){s.marginLeft='auto';s.marginRight='auto'}if(p['anchors.margins'])s.margin=p['anchors.margins']+'px';if(p.clip==='true')s.overflow='hidden';if(p.opacity)s.opacity=p.opacity;if(p.rotation)s.transform=`rotate(${p.rotation}deg)`;if(p.scale)s.transform=(s.transform?s.transform+' ':'')+`scale(${p.scale})`;const gc=(n.children||[]).filter(c=>c.type==='Gradient');if(gc.length){const stops=(gc[0].children||[]).filter(c=>c.type==='GradientStop');const cols=stops.map(s=>`${s.props?.color||'#000'} ${(parseFloat(s.props?.position||0))*100}%`).join(',');if(cols){s.background=`linear-gradient(180deg,${cols})`;delete s.backgroundColor}}return s}

function prettyPrint(){const tab=activeTab();if(!tab)return;const code=tab.doc.getValue();let fmt;try{if(tab.lang==='javascript'&&typeof js_beautify!=='undefined')fmt=js_beautify(code,{indent_size:2,max_preserve_newlines:2});else if(tab.lang==='htmlmixed'&&typeof html_beautify!=='undefined')fmt=html_beautify(code,{indent_size:2,max_preserve_newlines:2});else if(tab.lang==='css'&&typeof css_beautify!=='undefined')fmt=css_beautify(code,{indent_size:2});else if(tab.lang==='qml'&&typeof js_beautify!=='undefined')fmt=js_beautify(code,{indent_size:4,max_preserve_newlines:2});else if(tab.lang==='python')fmt=code.split('\n').map(l=>{const t=l.trimEnd();if(!t)return'';const i=t.search(/\S/);return' '.repeat(Math.floor(i/4)*4)+t.trimStart()}).join('\n').replace(/\n{3,}/g,'\n\n');else if(tab.lang==='shell')fmt=code.split('\n').reduce((a,l)=>{if(!l.trim()&&a.length&&a[a.length-1]==='')return a;a.push(l.trimEnd());return a},[]).join('\n');else{toast('Not supported','wrn');return}tab.doc.setValue(fmt);toast('Formatted','ok')}catch(e){toast('Error','err')}}

/* ═══ PREVIEW DOWNLOAD BUTTON ═══ */
function downloadFromPreview(){
  const tab = activeTab();
  if(!tab){ toast('No file','wrn'); return }
  // If previewing HTML, try to grab iframe's serialized content and download that
  if(tab.lang === 'htmlmixed'){
    const body = document.getElementById('preview-body');
    const ifr = body.querySelector('iframe');
    if(ifr){
      try{
        // attempt to read iframe document
        const d = ifr.contentDocument || ifr.contentWindow.document;
        const html = '<!doctype html>\n' + d.documentElement.outerHTML;
        const blob = new Blob([html], {type: 'text/html;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = tab.name || 'preview.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        toast('Downloaded preview','ok');
        return;
      }catch(e){
        // fallback to exporting the source code
      }
    }
  }
  doExport('file');
}

document.getElementById('file-import').addEventListener('change', async (e) => {
  const f = e.target.files && e.target.files[0];
  if(!f) return;
  const txt = await f.text().catch(()=>null);
  const name = f.name || ('uploaded_' + Date.now());
  if(txt===null){toast('Unable to read file','err');return}
  // choose language by extension
  const ext = (name.split('.').pop()||'').toLowerCase();
  const map = {py:'python',sh:'shell',qml:'qml',js:'javascript',html:'htmlmixed',css:'css'};
  const lang = map[ext] || 'javascript';
  addTab(name, lang, txt, true);
  toast('Imported '+name,'ok');
});

let cmdSel=0;

// Side panel behavior & renderers
const side = document.getElementById('side-pane');
const sideBody = document.getElementById('side-body');
const sideTitle = document.getElementById('side-title');
document.getElementById('side-close').addEventListener('click',()=>{closeSide()});

function showSidePanel(name){
  side.classList.remove('side-hidden');
  side.setAttribute('aria-hidden','false');
  side.style.display='flex';
  sideTitle.textContent = name.charAt(0).toUpperCase() + name.slice(1);
  renderSideContent(name);
  // ensure editor refresh to avoid layout glitches
  setTimeout(()=>S.editor&&S.editor.refresh(),120);
}

function closeSide(){
  side.classList.add('side-hidden');
  side.setAttribute('aria-hidden','true');
  side.style.display='none';
  // remove active from buttons
  document.querySelectorAll('.act-btn[data-p]').forEach(b=>b.classList.remove('active'));
}

// Renderers for each panel
function renderSideContent(name){
  sideBody.innerHTML = '';
  if(name === 'explorer'){
    const wrap = document.createElement('div');
    wrap.style.padding = '12px';
    wrap.innerHTML = `<div style="margin-bottom:8px;font-size:13px;color:var(--muted)">Files</div>`;
    const list = document.createElement('div');
    list.style.display = 'flex';
    list.style.flexDirection = 'column';
    list.style.gap = '6px';
    S.tabs.forEach(t=>{
      const it = document.createElement('button');
      it.className = 'wa-btn';
      it.style.justifyContent = 'space-between';
      it.style.padding = '8px 10px';
      it.style.fontSize = '13px';
      it.textContent = t.name;
      it.onclick = ()=>{switchTab(t.id);closeSide()};
      list.appendChild(it);
    });
    if(S.tabs.length===0) list.innerHTML = `<div style="color:var(--muted);font-size:13px">No files</div>`;
    wrap.appendChild(list);
    const act = document.createElement('div');
    act.style.display='flex';act.style.gap='8px';act.style.marginTop='12px';
    const nbtn = document.createElement('button'); nbtn.className='wa-btn primary'; nbtn.textContent='New'; nbtn.onclick=()=>{openNewFile()};
    const imp = document.createElement('button'); imp.className='wa-btn'; imp.textContent='Import'; imp.onclick=()=>{openFileImport()};
    act.appendChild(nbtn); act.appendChild(imp);
    wrap.appendChild(act);
    sideBody.appendChild(wrap);
  } else if(name === 'search'){
    const wrap = document.createElement('div');
    wrap.style.padding='12px';
    wrap.innerHTML = `<input id="side-search-input" placeholder="Search all files..." style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg0);color:var(--text);margin-bottom:8px">`;
    const res = document.createElement('div'); res.id='side-search-results'; res.style.maxHeight='40vh'; res.style.overflow='auto';
    wrap.appendChild(res);
    sideBody.appendChild(wrap);
    const inp = document.getElementById('side-search-input');
    inp.addEventListener('input',()=>{ renderSearchResults(inp.value) });
    inp.focus();
  } else if(name === 'git'){
    sideBody.innerHTML = `<div style="padding:12px;color:var(--muted)"><div style="font-weight:700;margin-bottom:8px">Source Control</div><div>Branch: <strong>main</strong></div><div style="margin-top:8px;color:var(--muted)">No changes</div></div>`;
  } else if(name === 'ext'){
    sideBody.innerHTML = `<div style="padding:12px;color:var(--muted)"><div style="font-weight:700;margin-bottom:8px">Extensions</div><div style="color:var(--muted)">No extensions installed</div></div>`;
  } else {
    sideBody.innerHTML = `<div style="padding:12px;color:var(--muted)">Empty</div>`;
  }
}

function renderSearchResults(q){
  const out = document.getElementById('side-search-results');
  out.innerHTML='';
  if(!q || q.trim().length<2){ out.innerHTML = `<div style="color:var(--muted);padding:8px">Type 2+ characters to search</div>`; return }
  const lower = q.toLowerCase();
  let found = 0;
  S.tabs.forEach(t=>{
    const v = t.doc.getValue();
    const lines = v.split('\n');
    lines.forEach((ln,i)=>{
      if(ln.toLowerCase().includes(lower)){
        found++;
        const el = document.createElement('div');
        el.style.padding='8px';
        el.style.borderBottom='1px solid var(--border)';
        el.style.cursor='pointer';
        el.innerHTML = `<div style="font-size:13px;color:var(--text2)">${esc(ln.trim())}</div><div style="font-size:11px;color:var(--muted)">${t.name} — line ${i+1}</div>`;
        el.onclick = ()=>{
          switchTab(t.id);
          S.editor.setCursor({line:i,ch:0});
          S.editor.focus();
          closeSide();
        };
        out.appendChild(el);
      }
    });
  });
  if(found===0) out.innerHTML = `<div style="color:var(--muted);padding:8px">No matches</div>`;
}
