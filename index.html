<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSCode Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ext-language_tools.js"></script>
    <style>
        :root {
            --bg-main: #1e1e1e;
            --bg-tabs: #252526;
            --bg-tab-inactive: #2d2d2d;
            --bg-tab-hover: #2b2d2e;
            --border-color: #333;
            --accent: #007acc;
            --accent-hover: #0062a3;
            --text-main: #d4d4d4;
            --text-muted: #969696;
            --console-bg: #111111;
            --error-color: #f48771;
            --warn-color: #cca700;
            --shell-color: #4caf50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header & Tabs */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-tabs);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .header::-webkit-scrollbar { display: none; }

        .tabs-container {
            display: flex;
            flex-grow: 1;
            align-items: flex-end;
            min-height: 40px;
        }

        .tab {
            background-color: var(--bg-tab-inactive);
            color: var(--text-muted);
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 13px;
            border-top: 2px solid transparent;
            border-right: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            touch-action: none;
            transition: background-color 0.2s, color 0.2s;
        }

        .tab:hover { background-color: var(--bg-tab-hover); }
        .tab.active {
            background-color: var(--bg-main);
            color: white;
            border-top: 2px solid var(--accent);
        }
        .tab.dragging {
            opacity: 0.5;
            background-color: var(--accent);
        }

        .close-tab {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            transition: background-color 0.2s, color 0.2s;
        }
        .close-tab:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #ff5f56;
        }

        .add-tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 0 15px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .add-tab-btn:hover { color: white; }

        .actions { 
            display: flex; 
            align-items: center; 
            padding-right: 10px; 
            gap: 6px;
        }
        
        .actions button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: 600;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.2s;
        }
        .actions button:hover { background-color: var(--accent-hover); }

        /* Configuration Utility Bar */
        .utility-bar {
            background-color: var(--bg-main);
            border-bottom: 1px solid var(--border-color);
            padding: 4px 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
        }
        .utility-bar label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .utility-bar select {
            background: var(--bg-tabs);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            padding: 2px 4px;
            outline: none;
        }

        /* Work Area */
        .workspace {
            display: flex;
            flex: 1;
            flex-direction: column;
            height: calc(100% - 72px);
        }
        @media (min-width: 768px) {
            .workspace { flex-direction: row; }
        }

        /* Editor Frame */
        #editor {
            flex: 1;
            height: 50vh;
            width: 100%;
            position: relative;
        }
        @media (min-width: 768px) {
            #editor { height: 100%; width: 50%; }
        }

        /* Fallback Textarea Engine */
        #fallback-textarea {
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            color: var(--text-main);
            border: none;
            padding: 15px;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        /* Output Viewport & Console Layout */
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-top: 2px solid var(--accent);
            height: 50vh;
            width: 100%;
        }
        @media (min-width: 768px) {
            .output-panel { height: 100%; width: 50%; border-top: none; border-left: 2px solid var(--accent); }
        }

        #preview {
            flex: 2;
            width: 100%;
            background: #fff;
            border: none;
        }

        .console-container {
            flex: 1;
            background-color: var(--console-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .console-header {
            background: var(--bg-tabs);
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .console-clear-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .console-clear-btn:hover { color: white; }

        #console-output {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: Consolas, monospace;
            font-size: 12px;
            color: var(--text-main);
        }
        .log-line { 
            padding: 3px 0; 
            border-bottom: 1px solid #1c1c1c; 
            word-wrap: break-word; 
            white-space: pre-wrap; 
            display: flex; 
            gap: 6px; 
        }
        .log-error { color: var(--error-color); background: rgba(244, 135, 113, 0.05); }
        .log-warn { color: var(--warn-color); background: rgba(204, 167, 0, 0.05); }
        .log-system { color: #888; font-style: italic; }
        .log-shell-cmd { color: var(--shell-color); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="tabs-container" id="tabs-container"></div>
        <button class="add-tab-btn" onclick="promptNewTab()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <div class="actions">
            <button onclick="runCode()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Run
            </button>
            <button onclick="exportFiles()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Export
            </button>
        </div>
    </div>

    <div class="utility-bar">
        <label>
            <input type="checkbox" id="wrap-toggle" onchange="toggleWordWrap(this.checked)"> Word Wrap
        </label>
        <label>
            Size:
            <select id="font-size-select" onchange="changeFontSize(this.value)">
                <option value="12px">12px</option>
                <option value="14px" selected>14px</option>
                <option value="16px">16px</option>
                <option value="18px">18px</option>
            </select>
        </label>
        <span id="save-status" style="margin-left: auto; font-style: italic; opacity: 0.7;">Ready</span>
    </div>

    <div class="workspace">
        <div id="editor"></div>
        <div class="output-panel">
            <iframe id="preview"></iframe>
            <div class="console-container">
                <div class="console-header">
                    <span>Live Output Log</span>
                    <div class="console-clear-btn" onclick="clearConsole()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        Clear
                    </div>
                </div>
                <div id="console-output"></div>
            </div>
        </div>
    </div>

    <script>
        // Safe Storage Wrappers
        function safeGetItem(key) {
            try { return localStorage.getItem(key); } 
            catch(e) { return null; }
        }
        function safeSetItem(key, val) {
            try { localStorage.setItem(key, val); } 
            catch(e) { /* Ignore - running in memory mode */ }
        }

        // Default Local File Template Architecture (Updated with Shebang)
        const defaultFiles = [
            { id: 'f1', name: 'index.html', type: 'html', content: '<h1>Hello World</h1>\n<p>Open the console below!</p>' },
            { id: 'f2', name: 'style.css', type: 'css', content: 'body {\n  font-family: sans-serif;\n  color: #333;\n  text-align: center;\n}\nh1 { color: #007acc; }' },
            { id: 'f3', name: 'script.js', type: 'javascript', content: 'console.log("App loaded successfully!");' },
            { id: 'f4', name: 'build.sh', type: 'shell', content: '#!/bin/sh\n# Welcome to the Shell Engine\necho "Starting pre-build sequence..."\nuname -a\n# curl https://jsonplaceholder.typicode.com/todos/1' }
        ];

        // Persistence State Initialization
        let parsedFiles = null;
        let storedData = safeGetItem('ide_files');
        if (storedData) {
            try { parsedFiles = JSON.parse(storedData); } catch (e) {}
        }

        let files = parsedFiles || defaultFiles;
        let activeFileId = safeGetItem('ide_active_file') || 'f1';
        let editorInstance = null;
        let isAceActive = false;

        // Vector Asset Compiler Map
        const icons = {
            html: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e34c26" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>',
            css: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#264de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>',
            js: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f0db4f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h4M8 17h4"></path></svg>',
            sh: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>',
            generic: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#969696" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>',
            close: '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'
        };

        function getFileIcon(name) {
            if (name.endsWith('.html')) return icons.html;
            if (name.endsWith('.css')) return icons.css;
            if (name.endsWith('.js')) return icons.js;
            if (name.endsWith('.sh')) return icons.sh;
            return icons.generic;
        }

        // Initialize Ace System or Core Fallback Engine
        try {
            if (typeof ace !== 'undefined') {
                editorInstance = ace.edit("editor");
                editorInstance.setTheme("ace/theme/tomorrow_night_eighties");
                editorInstance.setOptions({
                    fontSize: "14px",
                    showPrintMargin: false,
                    enableBasicAutocompletion: true,
                    enableLiveAutocompletion: true
                });
                isAceActive = true;
                systemLog("System Core: Advanced Editor loaded.");
            } else {
                throw new Error("Ace library blocked or offline");
            }
        } catch (e) {
            document.getElementById('editor').innerHTML = '<textarea id="fallback-textarea" spellcheck="false"></textarea>';
            editorInstance = {
                getValue: function() { return document.getElementById('fallback-textarea').value; },
                setValue: function(val) { document.getElementById('fallback-textarea').value = val; },
                session: { setMode: function(mode) {}, setUseWrapMode: function(b) {} }
            };
            systemLog("Environment Isolation: Script execution blocked. Fallback operational.");
        }

        // Core Synchronization Registry
        function syncState() {
            const activeFile = files.find(f => f.id === activeFileId);
            if (activeFile && editorInstance) activeFile.content = editorInstance.getValue();
            
            safeSetItem('ide_files', JSON.stringify(files));
            safeSetItem('ide_active_file', activeFileId);
            
            const status = document.getElementById('save-status');
            if (status) {
                status.innerText = "Saved";
                setTimeout(() => { status.innerText = "Synced"; }, 1000);
            }
        }

        function toggleWordWrap(enabled) {
            if (isAceActive) {
                editorInstance.session.setUseWrapMode(enabled);
            } else {
                const el = document.getElementById('fallback-textarea');
                if (el) el.style.whiteSpace = enabled ? 'pre-wrap' : 'pre';
            }
        }

        function changeFontSize(size) {
            if (isAceActive) {
                editorInstance.setFontSize(size);
            } else {
                const el = document.getElementById('fallback-textarea');
                if (el) el.style.fontSize = size;
            }
        }

        // Tab Management Engine
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            
            files.forEach((file) => {
                const tab = document.createElement('div');
                tab.className = 'tab' + (file.id === activeFileId ? ' active' : '');
                tab.dataset.id = file.id;
                
                const iconWrapper = document.createElement('span');
                iconWrapper.style.display = 'flex';
                iconWrapper.innerHTML = getFileIcon(file.name);

                const nameSpan = document.createElement('span');
                nameSpan.innerText = file.name;
                nameSpan.onclick = () => switchTab(file.id);
                
                const closeBtn = document.createElement('div');
                closeBtn.className = 'close-tab';
                closeBtn.innerHTML = icons.close;
                closeBtn.onclick = (e) => { e.stopPropagation(); closeTab(file.id); };

                tab.appendChild(iconWrapper);
                tab.appendChild(nameSpan);
                tab.appendChild(closeBtn);
                setupDraggableTab(tab, file.id);
                container.appendChild(tab);
            });
        }

        function switchTab(id) {
            syncState();
            activeFileId = id;
            const newFile = files.find(f => f.id === id);
            
            if (isAceActive) {
                let mode = 'text';
                if (newFile.type === 'html' || newFile.name.endsWith('.html')) mode = 'html';
                else if (newFile.type === 'css' || newFile.name.endsWith('.css')) mode = 'css';
                else if (newFile.type === 'javascript' || newFile.name.endsWith('.js')) mode = 'javascript';
                else if (newFile.type === 'shell' || newFile.name.endsWith('.sh')) mode = 'sh';
                
                editorInstance.session.setMode("ace/mode/" + mode);
                editorInstance.setValue(newFile.content, -1);
            } else {
                editorInstance.setValue(newFile.content);
            }
            renderTabs();
            safeSetItem('ide_active_file', activeFileId);
        }

        function promptNewTab() {
            const name = prompt("Enter complete filename (e.g. build.sh):", "script.js");
            if (!name) return;
            const newId = 'f' + Date.now();
            let type = 'text';
            if (name.endsWith('.html')) type = 'html';
            else if (name.endsWith('.css')) type = 'css';
            else if (name.endsWith('.js')) type = 'javascript';
            else if (name.endsWith('.sh')) type = 'shell';
            
            files.push({ id: newId, name: name, type: type, content: '' });
            switchTab(newId);
        }

        function closeTab(id) {
            if (files.length <= 1) return alert("System core restriction: Active workspace requires 1 minimum tab.");
            files = files.filter(f => f.id !== id);
            if (activeFileId === id) switchTab(files[0].id);
            else renderTabs();
            syncState();
        }

        function setupDraggableTab(tabElement, fileId) {
            const handleStart = (e) => {
                if(e.target.closest('.close-tab')) return;
                tabElement.classList.add('dragging');
            };
            const handleMove = (e) => {
                if(!tabElement.classList.contains('dragging')) return;
                e.preventDefault(); 
                const clientX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
                const container = document.getElementById('tabs-container');
                const tabs = Array.from(container.querySelectorAll('.tab:not(.dragging)'));
                
                let nextElement = null;
                for(let sibling of tabs) {
                    const rect = sibling.getBoundingClientRect();
                    if(clientX < rect.left + rect.width / 2) {
                        nextElement = sibling;
                        break;
                    }
                }
                if (nextElement) container.insertBefore(tabElement, nextElement);
                else container.appendChild(tabElement);
            };
            const handleEnd = (e) => {
                if(!tabElement.classList.contains('dragging')) return;
                tabElement.classList.remove('dragging');
                const newDOMOrder = Array.from(document.getElementById('tabs-container').children);
                files.sort((a, b) => {
                    return newDOMOrder.findIndex(el => el.dataset.id === a.id) - 
                           newDOMOrder.findIndex(el => el.dataset.id === b.id);
                });
                syncState();
            };

            tabElement.addEventListener('mousedown', handleStart);
            document.addEventListener('mousemove', handleMove, { passive: false });
            document.addEventListener('mouseup', handleEnd);
            tabElement.addEventListener('touchstart', handleStart, { passive: true });
            document.addEventListener('touchmove', handleMove, { passive: false });
            document.addEventListener('touchend', handleEnd);
        }

        /*================================================================
           CUSTOM SHELL INTERPRETER ENGINE (.sh parser)
        ================================================================*/
        async function executeShellScript(scriptContent) {
            const lines = scriptContent.split('\n');
            let isFirstLine = true;

            for (let line of lines) {
                line = line.trim();

                // Shebang Parser
                if (isFirstLine && line.startsWith('#!')) {
                    systemLog(`Interpreter initialized -> Executing via ${line.substring(2)}`);
                    isFirstLine = false;
                    continue; 
                }
                isFirstLine = false;

                if (!line || line.startsWith('#')) continue;

                const out = document.getElementById('console-output');
                if(out) {
                    out.innerHTML += '<div class="log-line log-shell-cmd">~ # ' + escapeHTML(line) + '</div>';
                    out.scrollTop = out.scrollHeight;
                }

                const parts = line.match(/(?:[^\s"']+|"[^"]*"|'[^']*')+/g) || [];
                if (parts.length === 0) continue;
                
                const cmd = parts[0].toLowerCase();
                const args = parts.slice(1).map(arg => arg.replace(/^["']|["']$/g, ''));

                try {
                    switch(cmd) {
                        case 'echo':
                            simLog('log', args.join(' '));
                            break;
                        case 'ls':
                        case 'dir':
                            const fileNames = files.map(f => f.name).join('  ');
                            simLog('log', fileNames);
                            break;
                        case 'whoami':
                            simLog('log', 'developer');
                            break;
                        case 'date':
                            simLog('log', new Date().toString());
                            break;
                        case 'clear':
                            clearConsole();
                            break;
                        case 'help':
                            simLog('log', 'Supported IDE shell commands: echo, ls, dir, help, whoami, clear, date, curl, uname');
                            break;
                        case 'uname':
                            const unameHelpText = `BusyBox v1.24.1 (2025-03-20 21:34:25 KST) multi-call binary.

Usage: uname [-amnrspvio]

Print system information

        -a      Print all
        -m      The machine (hardware) type
        -n      Hostname
        -r      Kernel release
        -s      Kernel name (default)
        -p      Processor type
        -v      Kernel version
        -i      The hardware platform
        -o      OS name
     --help  Print the help page`;

                            const unameHelpInvalid = `BusyBox v1.24.1 (2025-03-20 21:34:25 KST) multi-call binary.

Usage: uname [-amnrspvio]

Print system information

        -a      Print all
        -m      The machine (hardware) type
        -n      Hostname
        -r      Kernel release
        -s      Kernel name (default)
        -p      Processor type
        -v      Kernel version
        -i      The hardware platform
        -o      OS name
   --help    Prints the help page.`;

                            // Re-engineered for Ubuntu Mock Output
                            const sysInfo = {
                                s: 'Linux',
                                n: 'ubuntu',
                                r: '5.15.0-101-generic',
                                v: '#111-Ubuntu SMP PREEMPT Thu Mar 20 21:32:21 KST 2025',
                                m: 'x86_64',
                                p: 'x86_64',
                                i: 'x86_64',
                                o: 'GNU/Linux'
                            };

                            if (args.length === 0) {
                                simLog('log', sysInfo.s);
                                break;
                            }

                            if (args[0] === '--help') {
                                simLog('log', unameHelpText);
                                break;
                            }

                            let flags = args[0];
                            if (flags.startsWith('-')) {
                                flags = flags.substring(1);
                                let output = [];
                                let invalidFlag = null;

                                for (let char of flags) {
                                    if (!['a', 'm', 'n', 'r', 's', 'p', 'v', 'i', 'o'].includes(char)) {
                                        invalidFlag = char;
                                        break;
                                    }
                                }

                                if (invalidFlag) {
                                    simLog('log', `uname: invalid option -- '${invalidFlag}'\n${unameHelpInvalid}`);
                                    break;
                                }
                                
                                if (flags.includes('a')) {
                                    simLog('log', `${sysInfo.s} ${sysInfo.n} ${sysInfo.r} ${sysInfo.v} ${sysInfo.m} ${sysInfo.o}`);
                                    break;
                                }

                                const order = ['s', 'n', 'r', 'v', 'm', 'p', 'i', 'o'];
                                for(let f of order) {
                                    if(flags.includes(f)) output.push(sysInfo[f]);
                                }
                                
                                if (output.length > 0) {
                                    simLog('log', output.join(' '));
                                } else {
                                    simLog('log', sysInfo.s);
                                }
                            } else {
                                simLog('error', `uname: extra operand '${args[0]}'\nTry 'uname --help' for more information.`);
                            }
                            break;
                        case 'curl':
                            if (args.length > 0) {
                                simLog('log', `Fetching ${args[0]}...`);
                                const res = await fetch(args[0]);
                                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                                const text = await res.text();
                                simLog('log', text.substring(0, 200) + (text.length > 200 ? '\n...[truncated]' : ''));
                            } else {
                                simLog('error', 'curl: no URL specified');
                            }
                            break;
                        default:
                            simLog('error', `bash: ${cmd}: command not found`);
                    }
                } catch (err) {
                    simLog('error', `${cmd}: failed - ${err.message}`);
                }
            }
        }

        function simLog(type, msg) {
            const out = document.getElementById('console-output');
            const logLine = document.createElement('div');
            logLine.className = 'log-line log-' + type;
            logLine.innerHTML = '<span>&gt;&nbsp;</span>' + '<span>' + escapeHTML(msg) + '</span>';
            out.appendChild(logLine);
            out.scrollTop = out.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])
            );
        }

        const consoleHijackScript = "<script>\n" +
            "(function() {\n" +
            "    const send = (type, args) => {\n" +
            "        const parsedArgs = Array.from(args).map(arg => {\n" +
            "            if(typeof arg === 'object') return JSON.stringify(arg);\n" +
            "            return String(arg);\n" +
            "        });\n" +
            "        window.parent.postMessage({ source: 'live-preview', type: type, args: parsedArgs }, '*');\n" +
            "    };\n" +
            "    const ogLog = console.log, ogWarn = console.warn, ogErr = console.error;\n" +
            "    console.log = function() { send('log', arguments); ogLog.apply(console, arguments); };\n" +
            "    console.warn = function() { send('warn', arguments); ogWarn.apply(console, arguments); };\n" +
            "    console.error = function() { send('error', arguments); ogErr.apply(console, arguments); };\n" +
            "    window.onerror = function(msg, url, line) {\n" +
            "        send('error', [msg + ' (Line ' + line + ')']);\n" +
            "        return false;\n" +
            "    };\n" +
            "})();\n" +
            "</scr" + "ipt>";

        window.addEventListener('message', (event) => {
            if(event.data && event.data.source === 'live-preview') {
                const out = document.getElementById('console-output');
                const logLine = document.createElement('div');
                logLine.className = 'log-line log-' + event.data.type;
                logLine.innerHTML = '<span>&gt;&nbsp;</span><span>' + escapeHTML(event.data.args.join(' ')) + '</span>';
                out.appendChild(logLine);
                out.scrollTop = out.scrollHeight;
            }
        });

        function clearConsole() {
            document.getElementById('console-output').innerHTML = '';
        }

        function systemLog(msg) {
            const out = document.getElementById('console-output');
            if(out) {
                out.innerHTML += '<div class="log-line log-system">' + msg + '</div>';
                out.scrollTop = out.scrollHeight;
            }
        }

        async function runCode() {
            syncState();
            clearConsole();
            systemLog('System: Initiating build sequence...');

            const shellFiles = files.filter(f => f.type === 'shell' || f.name.endsWith('.sh'));
            for (let shFile of shellFiles) {
                await executeShellScript(shFile.content);
            }

            let htmlBase = '';
            let cssBlock = '';
            let jsBlock = '';

            files.forEach(f => {
                if(f.type === 'html' || f.name.endsWith('.html')) htmlBase += f.content + '\n';
                if(f.type === 'css' || f.name.endsWith('.css')) cssBlock += f.content + '\n';
                if(f.type === 'javascript' || f.name.endsWith('.js')) jsBlock += f.content + '\n';
            });

            const finalDocument = htmlBase + "\n" +
                "<style>\n" + cssBlock + "\n</style>\n" +
                consoleHijackScript + "\n" +
                "<script>\n" + jsBlock + "\n</scr" + "ipt>";

            document.getElementById('preview').srcdoc = finalDocument;
        }

        function exportFiles() {
            syncState();
            files.forEach(f => {
                if (!f.content.trim()) return;
                let mime = 'text/plain';
                if (f.type === 'html') mime = 'text/html';
                if (f.type === 'css') mime = 'text/css';
                if (f.type === 'javascript') mime = 'text/javascript';
                if (f.type === 'shell') mime = 'application/x-sh';

                const blob = new Blob([f.content], { type: mime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = f.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
            systemLog('System Workspace Dump: All assets downloaded.');
        }

        if (isAceActive) {
            editorInstance.on("change", () => {
                const activeFile = files.find(f => f.id === activeFileId);
                if (activeFile) activeFile.content = editorInstance.getValue();
                safeSetItem('ide_files', JSON.stringify(files));
            });
        } else {
            const el = document.getElementById('fallback-textarea');
            if (el) {
                el.addEventListener('input', () => {
                    const activeFile = files.find(f => f.id === activeFileId);
                    if (activeFile) activeFile.content = el.value;
                    safeSetItem('ide_files', JSON.stringify(files));
                });
            }
        }

        switchTab(activeFileId);
        runCode();
    </script>
</body>
</html>
